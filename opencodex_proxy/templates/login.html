<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenCodex Admin</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
        --bg: #eef1ef;
        --panel: #fbfaf7;
        --panel-strong: #f5f1ea;
        --ink: #17201b;
        --muted: #657069;
        --line: #d8ded8;
        --line-strong: #bac5bc;
        --accent: #245c4f;
        --accent-strong: #163f37;
        --danger: #b42318;
        --shadow: 0 24px 70px rgba(23, 32, 27, .12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(36, 92, 79, .12), transparent 34%),
          radial-gradient(circle at 82% 22%, rgba(184, 124, 75, .16), transparent 28%),
          var(--bg);
        color: var(--ink);
      }

      main {
        width: min(420px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .brand {
        padding: 28px 28px 22px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,0)),
          var(--panel-strong);
      }

      .mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        margin-bottom: 18px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        color: var(--accent);
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      form {
        padding: 24px 28px 28px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #46524b;
        font-size: 13px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        outline: none;
        transition: border-color .16s ease, box-shadow .16s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(36, 92, 79, .16);
      }

      button {
        width: 100%;
        min-height: 44px;
        margin-top: 16px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: background .16s ease, transform .16s ease, box-shadow .16s ease;
      }

      button:hover {
        background: var(--accent-strong);
        box-shadow: 0 10px 24px rgba(36, 92, 79, .18);
        transform: translateY(-1px);
      }

      button:active { transform: translateY(0); }

      .error {
        margin: 0 0 14px;
        padding: 10px 12px;
        border: 1px solid rgba(180, 35, 24, .28);
        border-radius: 8px;
        background: #fff4f2;
        color: var(--danger);
        font-size: 14px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 520px) {
        body { place-items: stretch; }
        main {
          width: auto;
          min-height: 100vh;
          border: 0;
          border-radius: 0;
        }
        .brand, form { padding-left: 22px; padding-right: 22px; }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0e1412;
          --panel: #161d1a;
          --panel-strong: #111815;
          --ink: #edf4ef;
          --muted: #a8b5ad;
          --line: #28342f;
          --line-strong: #3a4943;
          --accent: #74b7a5;
          --accent-strong: #9bd4c4;
          --shadow: 0 24px 70px rgba(0, 0, 0, .32);
        }
        input { background: #101714; }
        label { color: #d3ddd7; }
        button { color: #07100d; }
        .error { background: #331612; border-color: #77342c; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark">OC</div>
        <h1>OpenCodex Admin</h1>
        <p class="subtitle">管理渠道、模型映射与请求日志。</p>
      </div>
      <form method="post">
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <label class="sr-only" for="username">用户名</label>
        <input class="sr-only" id="username" name="username" autocomplete="username" value="admin" tabindex="-1">
        <label for="password">管理密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
        <button type="submit">进入控制台</button>
      </form>
    </main>
  </body>
</html>
