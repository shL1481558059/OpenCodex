<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenCodex Admin</title>
    <style>
      :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f7fb; color: #172033; }
      main { width: min(380px, calc(100vw - 32px)); background: white; border: 1px solid #d9e0ea; border-radius: 8px; padding: 24px; box-shadow: 0 10px 30px rgba(21, 34, 50, .08); }
      h1 { margin: 0 0 18px; font-size: 22px; }
      label { display: block; font-size: 13px; margin-bottom: 8px; color: #4d5b6d; }
      input { box-sizing: border-box; width: 100%; padding: 10px 12px; border: 1px solid #b9c3d1; border-radius: 6px; font-size: 15px; }
      button { margin-top: 16px; width: 100%; border: 0; border-radius: 6px; padding: 10px 12px; background: #1463ff; color: white; font-weight: 600; cursor: pointer; }
      .error { margin: 0 0 12px; color: #b42318; font-size: 14px; }
      @media (prefers-color-scheme: dark) {
        body { background: #101419; color: #edf2f7; }
        main { background: #171c22; border-color: #2a3440; }
        label { color: #b8c2cf; }
        input { background: #11161c; color: #edf2f7; border-color: #3b4654; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenCodex Admin</h1>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post">
        <label for="password">管理密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
        <button type="submit">进入</button>
      </form>
    </main>
  </body>
</html>
