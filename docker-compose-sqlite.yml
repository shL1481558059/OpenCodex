services:
  ocxp:
    image: shl148155/opencodexp:ocxp
    platform: linux/amd64
    container_name: ocxp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8080"
    env_file:
      - .env
    environment:
      - OPENCODEX_DB_PROVIDER=sqlite
      - OPENCODEX_DB_CONNECTION_STRING=Data Source=/app/logs/opencodex.db
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
