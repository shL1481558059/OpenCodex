name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate dependencies and tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.300"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run backend tests
        run: dotnet test opencodex_proxy/OpenCodex.sln --configuration Release

  build:
    name: Build ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-latest
            tauri_target: aarch64-apple-darwin
            desktop_target: darwin-arm64
            bundles: dmg
            apple_signing_identity: "-"
          - label: Windows x64
            runner: windows-latest
            tauri_target: x86_64-pc-windows-msvc
            desktop_target: win32-x64
            bundles: nsis
            apple_signing_identity: ""
          - label: Deepin Linux x64 (.deb)
            runner: ubuntu-22.04
            tauri_target: x86_64-unknown-linux-gnu
            desktop_target: linux-x64
            bundles: deb
            apple_signing_identity: ""

    env:
      CI: "true"
      OPENCODEX_DESKTOP_TARGET: ${{ matrix.desktop_target }}
      APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.300"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            patchelf

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tauriScript: npm run tauri --
          args: --target ${{ matrix.tauri_target }} --bundles ${{ matrix.bundles }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('OpenCodex {0}', github.ref_name) || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/v') }}
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          workflowArtifactNamePattern: "[name]_[version]_[platform]_[arch]_[bundle]"
